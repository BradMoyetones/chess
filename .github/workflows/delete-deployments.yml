name: Clean Deployments
on:
  workflow_dispatch:
jobs:
  delete_deployments:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Delete Deployments
        uses: strumwolf/delete-deployment-environment@v3
        with:
          onlyRemoveDeployments: true
          token: ${{ secrets.GITHUB_TOKEN }}
